{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>{% block title %}Apuesta24/7{% endblock %}</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />

  <!-- CSS base + componentes compartidos -->
  <link rel="stylesheet" href="{% static 'css/main.css' %}" />

  <!-- CSS específico de la página -->
  {% block page_css %}{% endblock %}
</head>
<body>

  {% block body %}{% endblock %}

  <!-- JS de componentes compartidos -->
  <script src="{% static 'js/base/helpers.js' %}"></script>
  <script src="{% static 'js/components/password-toggle.js' %}"></script>
  <script src="{% static 'js/components/form-validation.js' %}"></script>

  <!-- JS específico de la página -->
  {% block page_js %}{% endblock %}

</body>
</html>
